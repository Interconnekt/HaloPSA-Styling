<!--
  Tile template — ORIGINAL (pre-refresh HaloPSA state).
  Source: Configuration → Tickets → Field Lists → Tile Template
  Captured 2026-04-19.

  NOTES:
  - Table-based layout (legacy WYSIWYG output — not a HaloPSA requirement).
  - Inline styles throughout; no classes.
  - `data-empty="true"` is a HaloPSA editor hint, harmless.
  - Placeholders used here: $user_name, $client_name, $id, $tickettype_id,
    $lastactiondate, $summary, $status_icon (icon form — note `_icon` suffix
    suggests other *_icon placeholders may also exist, e.g. $priority_icon).
-->
<table style="width: 100%; height: 77px;">
	<tbody>
		<tr style="height: 30px;">
			<td><span style="font-size: 14px;">$user_name ($client_name)</span></td>
			<td style="width:135px;text-align: right;"><span style="font-size: 14px;">ID:$id</span></td>
		</tr>
		<tr style="height: 30px;">
			<td><span style="font-size: 12px;">$tickettype_id</span></td>
			<td>
				<div data-empty="true" style="text-align: right;"><span style="font-size: 12px; color: rgb(119, 119, 119);">$lastactiondate</span></div>
			</td>
		</tr>
		<tr style="height: 30px;">
			<td><span style="font-size: 12px; color: rgb(119, 119, 119);">$summary</span></td>
			<td>
				<div data-empty="true" style="text-align: right;"><span style="font-size: 12px;">$status_icon</span></div>
			</td>
		</tr>
	</tbody>
</table>
